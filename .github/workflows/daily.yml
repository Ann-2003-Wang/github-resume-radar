name: Daily GitHub Resume Radar

on:
  schedule:
    # 每天北京时间 10:00（UTC 2:00）执行，可根据需要修改
    - cron: '0 2 * * *'
  workflow_dispatch:   # 允许手动触发，方便测试

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run main script
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BITABLE_ID: ${{ secrets.FEISHU_BITABLE_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python main.py

# on.schedule.cron: '0 2 * * *' 表示 UTC 时间凌晨 2 点执行（北京时间上午 10 点）。

# workflow_dispatch 让你可以在 GitHub 仓库的 Actions 页面手动点击运行，用于测试。

# 环境变量通过 secrets 传入，需要在 GitHub 仓库里设置